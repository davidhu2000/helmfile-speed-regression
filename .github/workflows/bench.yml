name: bench

on:
  workflow_dispatch:
    inputs:
      count:
        description: Number of releases
        default: "10"

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
        with:
          version: v4.2.3
      - uses: helm/kind-action@v1.14.0
        with:
          cluster_name: helmfile-speed
      - run: helm plugin install https://github.com/databus23/helm-diff --version v3.15.10 --verify=false
      - run: chmod +x scripts/bench.sh && COUNT=${{ github.event.inputs.count || '10' }} ./scripts/bench.sh
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: results
          path: results.txt
